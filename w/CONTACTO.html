<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
  background-color: #5b0f1e; /* cambiar el color*/
  margin: 0;                /* Elimina márgenes por defecto */
}
    
/* 1. Centrar el botón en la página */
  .contenedor-centrado {
    display: flex;
    justify-content: center;  /* Centrado horizontal */
    align-items: center;      /* Centrado vertical */
    
  }

.boton-ig {
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    color: rgb(255, 255, 255);
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 50px; /* Bordes redondeados */
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px; /* Espacio entre el logo y el texto */
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  /*Efecto al pasar el mouse */
  .boton-ig:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* Tamaño del icono */
  .boton-ig i {
    font-size: 1.5rem;
  }

/* Título */
h1 {
    text-align: center;
    color: pink;
    margin-top: 30px;
}

/* Contenedor */
.contenedor {
    width: 45%;
    margin: 30px auto;
}

/* Tarjeta */
.bloque {
    background-color: rgb(215, 205, 215);
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

/* Imagen */
.bloque img {
    width: 100%;
    border-radius: 10px;
}

/* Texto */
.bloque p {
    margin-top: 15px;
    font-size: 25px;
}

/* Links tipo botón */
a {
    display: block;
    margin-top: 15px;
    padding: 10px;
    background-color: #610F25;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

a:hover {
    background-color: #8a1c3a;
}

</style>

</head>

<body>

<h1>Contacto</h1>

</div>
</body>

</html>
