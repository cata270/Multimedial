<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <meta charset="UTF-8">
  <title>Contacto</title>

  <style>
    /* 1. Animación definida */
    @keyframes entradaSuave {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      background-color: #3f0a15;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Aplicamos la animación al título y al contenedor principal */
    h1, .contenedor, .contenedor-centrado {
      animation: entradaSuave 1s ease-out forwards;
    }

    .contenedor-centrado {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 50px;
    }

    .boton-ig {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .boton-ig:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: pink;
      margin-top: 50px;
      font-size: 50px;
    }

    .contenedor {
      width: 45%;
      margin: 30px auto;
    }

    .bloque {
      background-color: rgb(215, 205, 215);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .bloque img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.5s ease;
    }
    
    /* Pequeño detalle: la imagen crece un poco al pasar el mouse */
    .bloque img:hover {
      transform: scale(1.02);
    }

    .bloque p {
      margin-top: 15px;
      font-size: 20px;
      color: #333;
    }

    a {
      display: block;
      margin-top: 15px;
      padding: 12px;
      background-color: #610F25;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background-color: #8a1c3a;
      letter-spacing: 1px; /* Animación simple de texto */
    }

  </style>
</head>

<body>

  <h1>Contacto</h1>

  <div class="contenedor">
    <div class="bloque">
      <img src="img/homero.jpeg" alt="Contacto">
      <p>
        Email: catalinapaz.olivaresr@gmail.com <br>
        Teléfono: +56 9 57459157
      </p>
      <a href="index.html">PÁGINA PRINCIPAL</a>
      <a href="OBRAS.html">OBRAS</a>
    </div>
  </div>

  <div class="contenedor-centrado">
    <a href="https://www.instagram.com/catayajuu" class="boton-ig" target="_blank">
      <i class="fab fa-instagram"></i> Sígueme en Instagram
    </a>
  </div>

</body>
</html>
